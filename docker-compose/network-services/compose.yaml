services:
  adguard:
    image: adguard/adguardhome
    ports:
      - 3020:80
      - 53:53/tcp
      - 53:53/udp
    volumes:
      - adguard-data:/opt/adguardhome/work
      - adguard-config:/opt/adguardhome/conf
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == srv-01
      restart_policy:
        condition: on-failure

  newt:
    image: fosrl/newt:1.15.0
    container_name: newt
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == srv-01
      restart_policy:
        condition: on-failure

volumes:
  adguard-data:
    external: false
    name: adguard-data

  adguard-config:
    external: false
    name: adguard-config
